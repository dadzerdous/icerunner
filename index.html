<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Runner Mobile - Pro</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #222; margin: 0 auto; width: 100vw; height: auto; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
        .mobile-hud { position: absolute; bottom: 0; width: 100%; height: 60px; display: flex; opacity: 0.5; pointer-events: none; }
        .zone { flex: 1; border: 1px solid #444; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px;">SCORE: <span id="score">0</span></div>
    </div>
    
    <div class="mobile-hud">
        <div class="zone">HOLD LEFT: SLIDE</div>
        <div class="zone">HOLD RIGHT: HIGH JUMP</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = 800;
canvas.height = 400;

let score = 0;
let gameActive = true;
let speed = 6;
let frameCount = 0;
let nextSpawnFrame = 0;

const player = {
    x: 80, y: 300,
    width: 40, height: 60,
    baseHeight: 60, slideHeight: 30,
    color: '#3498db',
    dy: 0, 
    jumpForce: -10,      // Initial burst
    jumpHoldForce: -0.5, // Added while holding
    maxJumpFrames: 15,   // How long you can hold to go higher
    jumpCounter: 0,
    gravity: 0.7,
    grounded: false, 
    isSliding: false,
    isJumping: false
};

let obstacles = [];
const input = { left: false, right: false };

// --- INPUT HANDLING ---
function handleStart(e) {
    if (!gameActive) { resetGame(); return; }
    
    const touchX = e.touches ? e.touches[0].clientX : e.clientX;
    const screenWidth = window.innerWidth;

    if (touchX < screenWidth / 2) {
        input.left = true;
    } else {
        input.right = true;
        if (player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
            player.isJumping = true;
            player.jumpCounter = 0;
        }
    }
}

function handleEnd(e) {
    if (e.touches) {
        let leftActive = false;
        let rightActive = false;
        for(let i=0; i<e.touches.length; i++) {
            if (e.touches[i].clientX < window.innerWidth / 2) leftActive = true;
            else rightActive = true;
        }
        input.left = leftActive;
        input.right = rightActive;
    } else {
        input.left = false;
        input.right = false;
    }
    
    // Stop the upward boost as soon as the finger is lifted
    if (!input.right) {
        player.isJumping = false;
    }
}

window.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, {passive: false});
window.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(e); }, {passive: false});
window.addEventListener('mousedown', handleStart);
window.addEventListener('mouseup', handleEnd);

// Keyboard Logic
window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowUp' || e.code === 'Space') {
        if (player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
            player.isJumping = true;
            player.jumpCounter = 0;
        }
        input.right = true;
    }
    if (e.code === 'ArrowDown') input.left = true;
    if (!gameActive) resetGame();
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowUp' || e.code === 'Space') { input.right = false; player.isJumping = false; }
    if (e.code === 'ArrowDown') input.left = false;
});

function spawnObstacle() {
    const rand = Math.random();
    let type;
    
    // 33% chance for each type
    if (rand < 0.33) type = 'ground';      // Must jump
    else if (rand < 0.66) type = 'mid';    // Must jump high or slide
    else type = 'air';                     // Must slide

    let obsY, obsH, obsW, obsCol;

    switch(type) {
        case 'ground':
            obsY = 310; obsH = 50; obsW = 35; obsCol = '#e74c3c';
            break;
        case 'mid':
            obsY = 280; obsH = 40; obsW = 40; obsCol = '#9b59b6'; // Purple middle block
            break;
        case 'air':
            obsY = 240; obsH = 40; obsW = 45; obsCol = '#f1c40f';
            break;
    }

    obstacles.push({ x: canvas.width, y: obsY, width: obsW, height: obsH, color: obsCol });
    nextSpawnFrame = frameCount + 45 + Math.floor(Math.random() * 40);
}

function resetGame() {
    score = 0; speed = 6; obstacles = []; gameActive = true;
    player.y = 300; player.dy = 0; frameCount = 0; nextSpawnFrame = 0;
    scoreEl.innerText = score;
    update();
}

function update() {
    if (!gameActive) return;
    frameCount++;

    // Slide Logic
    if (input.left && player.grounded) {
        player.isSliding = true;
        player.height = player.slideHeight;
    } else {
        player.isSliding = false;
        player.height = player.baseHeight;
    }

    // High Jump Logic (Variable Jump)
    if (input.right && player.isJumping) {
        if (player.jumpCounter < player.maxJumpFrames) {
            player.dy += player.jumpHoldForce;
            player.jumpCounter++;
        }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ground line
    ctx.strokeStyle = '#555';
    ctx.beginPath(); ctx.moveTo(0, 360); ctx.lineTo(canvas.width, 360); ctx.stroke();

    // Physics
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y + player.height > 360) {
        player.y = 360 - player.height;
        player.dy = 0;
        player.grounded = true;
        player.isJumping = false;
    }

    // Draw Player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    if (frameCount >= nextSpawnFrame) spawnObstacle();

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.x -= speed;
        ctx.fillStyle = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

        // Collision
        if (player.x < obs.x + obs.width && player.x + player.width > obs.x &&
            player.y < obs.y + obs.height && player.y + player.height > obs.y) {
            gameActive = false;
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "30px Arial";
            ctx.fillText("CAUGHT!", canvas.width/2, 200);
            ctx.font = "20px Arial";
            ctx.fillText("Tap to try again", canvas.width/2, 240);
        }

        if (obs.x + obs.width < 0) {
            obstacles.splice(i, 1);
            score++;
            scoreEl.innerText = score;
            speed += 0.05;
        }
    }
    requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
